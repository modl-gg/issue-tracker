name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
type: Bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? A few sentences of context.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Numbered steps someone can follow to hit the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead.
    validations:
      required: true

  - type: input
    id: affected-area
    attributes:
      label: Affected Area / Component
      description: Which repo, service, page, or module is affected. File paths welcome (e.g. src/api/auth.ts).

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in whatever is relevant; delete the rest.
      value: |
        - Branch / commit:
        - OS:
        - Browser / runtime:
        - Version:

  - type: textarea
    id: logs
    attributes:
      label: Stack Trace / Logs
      description: Paste error output, stack traces, or relevant logs. This will be rendered as a code block.
      render: shell

  - type: textarea
    id: images
    attributes:
      label: Relevant Images
      description: Drag-and-drop screenshots or screen recordings here. Leave blank if none.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: "Anything else worth noting: related issues, recent changes, suspected cause, workarounds."
